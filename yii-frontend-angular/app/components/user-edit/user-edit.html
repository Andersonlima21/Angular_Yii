<!-- Header do usuário -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <nav aria-label="breadcrumb" class="mb-1">
            <ol class="breadcrumb mb-0 small">
                <li class="breadcrumb-item">
                    <a ng-click="$ctrl.backToList()" style="cursor:pointer" class="text-decoration-none">Usuários</a>
                </li>
                <li class="breadcrumb-item active">{{ $ctrl.user.name }}</li>
            </ol>
        </nav>
        <h4 class="mb-0">
            <i class="bi bi-person-gear me-1"></i>
            {{ $ctrl.user.name }}
            <small class="text-muted fs-6">#{{ $ctrl.user.id }}</small>
        </h4>
        <small class="text-muted">{{ $ctrl.user.email }}</small>
    </div>
    <button class="btn btn-outline-secondary btn-sm" ng-click="$ctrl.backToList()">
        <i class="bi bi-arrow-left"></i> Voltar
    </button>
</div>

<!-- Layout: pills verticais + conteúdo -->
<div class="row g-0">

    <!-- Pills verticais -->
    <div class="col-md-2 col-12 mb-3 mb-md-0">
        <div class="nav flex-row flex-md-column nav-pills gap-1 pe-md-3">
            <a class="nav-link d-flex align-items-center gap-2"
               ui-sref="editUser.info({id: $ctrl.userId})"
               ui-sref-active="active">
                <i class="bi bi-person"></i>
                <span>Info</span>
            </a>
            <a class="nav-link d-flex align-items-center gap-2"
               ui-sref="editUser.configs({id: $ctrl.userId})"
               ui-sref-active="active">
                <i class="bi bi-sliders"></i>
                <span>Configs</span>
                <span class="badge bg-secondary ms-auto d-none d-md-inline">{{ $ctrl.user.configs.length || 0 }}</span>
            </a>
            <a class="nav-link d-flex align-items-center gap-2"
               ui-sref="editUser.profiles({id: $ctrl.userId})"
               ui-sref-active="active">
                <i class="bi bi-person-vcard"></i>
                <span>Profile</span>
                <i class="bi ms-auto d-none d-md-inline"
                   ng-class="$ctrl.user.profiles.length ? 'bi-check-circle-fill text-success' : 'bi-dash-circle text-muted'"></i>
            </a>
        </div>
    </div>

    <!-- Conteúdo da tab -->
    <div class="col-md-10 col-12">
        <div ui-view></div>
    </div>

</div>
