<h2 class="mb-3"><i class="bi bi-person-plus-fill"></i> Novo usuário</h2>

<div ng-if="$ctrl.error" class="alert alert-danger">{{ $ctrl.error }}</div>

<form class="card card-body" ng-submit="$ctrl.submit()" novalidate>
    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" ng-model="$ctrl.form.name" required maxlength="255">
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" ng-model="$ctrl.form.email" required maxlength="255">
    </div>

    <div class="d-flex gap-2 justify-content-end">
        <button type="button" class="btn btn-secondary"
                ng-click="$ctrl.cancel()" ng-disabled="$ctrl.saving">
            Cancelar
        </button>
        <button type="submit" class="btn btn-primary"
                ng-disabled="$ctrl.saving || !$ctrl.form.name || !$ctrl.form.email">
            <i class="bi bi-check-lg"></i>
            <span ng-if="!$ctrl.saving">Criar e editar</span>
            <span ng-if="$ctrl.saving">Salvando...</span>
        </button>
    </div>
</form>
