<!-- Breadcrumb -->
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a ui-sref="users" class="text-decoration-none">Usuários</a>
        </li>
        <li class="breadcrumb-item active">Novo usuário</li>
    </ol>
</nav>

<h4 class="mb-4"><i class="bi bi-person-plus-fill me-2"></i>Novo usuário</h4>

<div ng-if="$ctrl.error" class="alert alert-danger">{{ $ctrl.error }}</div>

<form class="card card-body" ng-submit="$ctrl.submit()" novalidate>

    <div class="form-floating mb-3">
        <input type="text" class="form-control" id="createName" placeholder="Nome completo"
               ng-model="$ctrl.form.name" required maxlength="255">
        <label for="createName">Nome completo</label>
    </div>

    <div class="form-floating mb-4">
        <input type="email" class="form-control" id="createEmail" placeholder="E-mail"
               ng-model="$ctrl.form.email" required maxlength="255">
        <label for="createEmail">E-mail</label>
    </div>

    <div class="d-flex gap-2 justify-content-end">
        <button type="button" class="btn btn-outline-secondary"
                ng-click="$ctrl.cancel()" ng-disabled="$ctrl.saving">
            Cancelar
        </button>
        <button type="submit" class="btn btn-primary"
                ng-disabled="$ctrl.saving || !$ctrl.form.name || !$ctrl.form.email">
            <i class="bi bi-check-lg"></i>
            <span ng-if="!$ctrl.saving">Criar e editar</span>
            <span ng-if="$ctrl.saving">
                <span class="spinner-border spinner-border-sm me-1" role="status"></span>Salvando...
            </span>
        </button>
    </div>

</form>
