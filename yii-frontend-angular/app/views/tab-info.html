<div ng-if="message" class="alert alert-success">{{ message }}</div>
<div ng-if="error" class="alert alert-danger">{{ error }}</div>

<form class="card card-body" ng-submit="save()" novalidate>
    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" ng-model="form.name" required maxlength="255">
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" ng-model="form.email" required maxlength="255">
    </div>

    <div class="row text-muted small mb-3">
        <div class="col-md-6">Criado: {{ user.created_at | sqlDate }}</div>
        <div class="col-md-6">Atualizado: {{ user.updated_at | sqlDate }}</div>
    </div>

    <div class="text-end">
        <button type="submit" class="btn btn-primary" ng-disabled="saving">
            <i class="bi bi-save"></i>
            <span ng-if="!saving">Salvar</span>
            <span ng-if="saving">Salvando...</span>
        </button>
    </div>
</form>
