<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h2 class="mb-0">
            <i class="bi bi-person-gear"></i>
            Editando: {{ user.name }}
            <small class="text-muted">#{{ user.id }}</small>
        </h2>
        <small class="text-muted">{{ user.email }}</small>
    </div>
    <button class="btn btn-outline-secondary" ng-click="backToList()">
        <i class="bi bi-arrow-left"></i> Voltar
    </button>
</div>

<ul class="nav nav-tabs mb-3">
    <li class="nav-item">
        <a class="nav-link" ui-sref="editUser.info({id: userId})" ui-sref-active="active">
            <i class="bi bi-person"></i> Info
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link" ui-sref="editUser.configs({id: userId})" ui-sref-active="active">
            <i class="bi bi-sliders"></i> Configs
            <span class="badge bg-secondary">{{ user.configs.length || 0 }}</span>
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link" ui-sref="editUser.profiles({id: userId})" ui-sref-active="active">
            <i class="bi bi-person-vcard"></i> Profile
            <i class="bi" ng-class="user.profiles.length ? 'bi-check-circle-fill text-success' : 'bi-dash-circle text-muted'"></i>
        </a>
    </li>
</ul>

<div ui-view></div>
