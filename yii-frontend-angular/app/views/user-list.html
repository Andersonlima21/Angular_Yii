<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0"><i class="bi bi-people-fill"></i> Usuários</h2>
    <button class="btn btn-primary" ng-click="create()">
        <i class="bi bi-plus-lg"></i> Novo usuário
    </button>
</div>

<div class="card mb-3">
    <div class="card-body">
        <div class="row g-2">
            <div class="col-md-8">
                <label class="form-label">Buscar (nome ou email)</label>
                <input type="text" class="form-control" ng-model="filter.q"
                       placeholder="ex: maria, @gmail.com">
            </div>
            <div class="col-md-2">
                <label class="form-label">Status</label>
                <select class="form-select" ng-model="filter.ativo">
                    <option value="">Todos</option>
                    <option value="sim">Ativo</option>
                    <option value="nao">Inativo</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-outline-secondary w-100" ng-click="load()">
                    <i class="bi bi-arrow-clockwise"></i> Recarregar
                </button>
            </div>
        </div>
    </div>
</div>

<div ng-if="loading" class="alert alert-info">Carregando...</div>
<div ng-if="error" class="alert alert-danger">{{ error }}</div>

<div class="card mb-4">
    <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-dark">
                <tr>
                    <th style="width: 60px">#</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th style="width: 110px" class="text-center">Status</th>
                    <th style="width: 200px" class="text-end">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="u in users | filter:matchFilter"
                    ng-class="{'table-secondary': !u.is_active}">
                    <td class="text-muted">{{ u.id }}</td>
                    <td>
                        <span ng-class="{'text-muted': !u.is_active}">{{ u.name }}</span>
                    </td>
                    <td class="small text-muted">{{ u.email }}</td>
                    <td class="text-center">
                        <span ng-if="u.is_active" class="badge rounded-pill bg-success">
                            <i class="bi bi-check-circle-fill"></i> Ativo
                        </span>
                        <span ng-if="!u.is_active" class="badge rounded-pill bg-secondary">
                            <i class="bi bi-dash-circle"></i> Inativo
                        </span>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary" ng-click="edit(u.id)">
                            <i class="bi bi-pencil"></i> Editar
                        </button>
                        <button class="btn btn-sm"
                                ng-class="u.is_active ? 'btn-outline-warning' : 'btn-outline-success'"
                                ng-click="toggleActive(u)"
                                title="{{ u.is_active ? 'Inativar' : 'Ativar' }}">
                            <i class="bi" ng-class="u.is_active ? 'bi-slash-circle' : 'bi-check-circle'"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" ng-click="remove(u)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr ng-if="!loading && (users | filter:matchFilter).length === 0">
                    <td colspan="5" class="text-center text-muted py-4">
                        Nenhum usuário encontrado.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
