<h2 class="mb-3"><i class="bi bi-person-plus-fill"></i> Novo usuário</h2>

<div ng-if="error" class="alert alert-danger">{{ error }}</div>

<form class="card card-body" ng-submit="submit()" novalidate>
    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" ng-model="form.name" required maxlength="255">
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" ng-model="form.email" required maxlength="255">
    </div>

    <div class="d-flex gap-2 justify-content-end">
        <button type="button" class="btn btn-secondary" ng-click="cancel()" ng-disabled="saving">
            Cancelar
        </button>
        <button type="submit" class="btn btn-primary" ng-disabled="saving || !form.name || !form.email">
            <i class="bi bi-check-lg"></i>
            <span ng-if="!saving">Criar e editar</span>
            <span ng-if="saving">Salvando...</span>
        </button>
    </div>
</form>
