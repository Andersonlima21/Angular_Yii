<!doctype html>
<html lang="pt-br" ng-app="yiiApp">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YiiApp — Gestão de Usuários</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="app/app.css">
</head>
<body>

<!-- Mobile header (só aparece em telas < md) -->
<header class="app-mobile-header navbar navbar-dark bg-primary">
    <span class="navbar-brand fw-semibold">
        <i class="bi bi-people-fill me-2"></i>YiiApp
    </span>
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#sidebarMobile"
            aria-controls="sidebarMobile">
        <span class="navbar-toggler-icon"></span>
    </button>
</header>

<div class="d-flex">

    <!-- Sidebar — desktop (≥ md) -->
    <nav class="app-sidebar bg-primary d-none d-md-flex flex-column p-3">
        <a class="navbar-brand text-white fw-semibold mb-4 px-2 text-decoration-none"
           ui-sref="users">
            <i class="bi bi-people-fill me-2"></i>YiiApp
        </a>
        <div class="nav flex-column gap-1">
            <a class="nav-link d-flex align-items-center gap-2"
               ui-sref="users" ui-sref-active="active">
                <i class="bi bi-people"></i> Usuários
            </a>
            <a class="nav-link d-flex align-items-center gap-2"
               ui-sref="newUser" ui-sref-active="active">
                <i class="bi bi-person-plus"></i> Novo usuário
            </a>
        </div>
    </nav>

    <!-- Offcanvas — mobile -->
    <div class="offcanvas offcanvas-start bg-primary text-white"
         id="sidebarMobile" style="width:240px" tabindex="-1">
        <div class="offcanvas-header border-bottom border-white border-opacity-25">
            <span class="offcanvas-title fw-semibold">
                <i class="bi bi-people-fill me-2"></i>YiiApp
            </span>
            <button type="button" class="btn-close btn-close-white"
                    data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
        </div>
        <div class="offcanvas-body px-3 pt-3">
            <div class="nav flex-column gap-1">
                <a class="nav-link d-flex align-items-center gap-2"
                   ui-sref="users" ui-sref-active="active">
                    <i class="bi bi-people"></i> Usuários
                </a>
                <a class="nav-link d-flex align-items-center gap-2"
                   ui-sref="newUser" ui-sref-active="active">
                    <i class="bi bi-person-plus"></i> Novo usuário
                </a>
            </div>
        </div>
    </div>

    <!-- Conteúdo principal -->
    <main class="app-content">
        <div ui-view></div>
    </main>

</div>

<!-- CDN Vendor — Bootstrap JS antes do AngularJS (requerido pela diretiva bs-tooltip) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@uirouter/angularjs@1.0.30/release/angular-ui-router.min.js"></script>

<!-- App core -->
<script src="app/app.js"></script>

<!-- Filtros e diretivas -->
<script src="app/filters/sqlDate.js"></script>
<script src="app/directives/phoneMask.js"></script>
<script src="app/directives/bsTooltip.js"></script>

<!-- Services -->
<script src="app/services/apiConfig.js"></script>
<script src="app/services/userService.js"></script>
<script src="app/services/userConfigService.js"></script>
<script src="app/services/userProfileService.js"></script>
<script src="app/services/userProfileSettingService.js"></script>
<script src="app/services/userEditContext.js"></script>

<!-- Shared components -->
<script src="app/shared/alert-msg/alert-msg.component.js"></script>

<!-- Components -->
<script src="app/components/user-list/user-list.component.js"></script>
<script src="app/components/user-create/user-create.component.js"></script>
<script src="app/components/user-edit/user-edit.component.js"></script>
<script src="app/components/tab-info/tab-info.component.js"></script>
<script src="app/components/tab-configs/tab-configs.component.js"></script>
<script src="app/components/tab-profiles/tab-profiles.component.js"></script>

</body>
</html>
