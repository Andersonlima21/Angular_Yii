<!doctype html>
<html lang="pt-br" ng-app="yiiApp">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yii2 + AngularJS — Estudo</title>

    <link rel="stylesheet"

    <style>

            <li class="nav-item">
                <a class="nav-link" ui-sref="users" ui-sref-active="active">Usuários</a>
